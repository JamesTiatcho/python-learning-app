<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Python Basics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-content">
    <div class="auth-card">
      <h1>Login</h1>
      <p>Login first before taking lessons and final quiz.</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>
      </form>

      <p>No account yet? <a href="register.html">Create account</a></p>

      <div class="hint">
        <strong>Admin setup:</strong><br>
        Register your admin email first, then change its role to <strong>admin</strong> in Firestore.
      </div>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
